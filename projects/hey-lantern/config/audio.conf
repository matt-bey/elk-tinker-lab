# ALSA config for hey-lantern POC
# USB webcam mic as default capture device.
# Pi Zero 2W has no onboard audio — USB device is card 0.
#
# If card numbering is wrong, run `arecord -l` on the Pi to find the right card.
# Update hw:0,0 below to match (format is hw:<card>,<device>).

pcm.!default {
    type asym
    capture.pcm "usb_mic"
    playback.pcm "null"
}

pcm.usb_mic {
    type plug
    slave {
        pcm "hw:0,0"
    }
}

ctl.!default {
    type hw
    card 0
}
