# RetroArch config — NES system overrides
# Location on Pi: /opt/retropie/configs/nes/retroarch.cfg
#
# Applies crt-pi shader to NES emulation only.
# crt-pi is a Pi-optimised GLSL shader — lightweight enough for the Zero W.
# Monitor with fps_show = "true" if you suspect frame drops.

video_shader = "/opt/retropie/emulators/retroarch/shader/crt/crt-pi.glsl"
video_shader_enable = "true"
