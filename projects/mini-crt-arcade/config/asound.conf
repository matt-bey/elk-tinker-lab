# ALSA config — routes audio to HDMI display's 3.5mm jack (card 0)
# HDMI audio is card 0 on Pi Zero W when hdmi_drive=2 is set in config.txt
# Verify card number with: aplay -l
#
# For USB DAC fallback: change card to 1

pcm.!default {
    type hw
    card 0
}

ctl.!default {
    type hw
    card 0
}
