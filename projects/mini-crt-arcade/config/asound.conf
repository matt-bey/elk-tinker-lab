# ALSA config — routes audio to USB DAC (card 1)
# Update card number if audio device changes (check with: aplay -l)
#
# NOTE: When using Waveshare HDMI display for audio, this file may not be needed
# (HDMI audio is default when hdmi_drive=2). Keep this for USB DAC fallback.

pcm.!default {
    type hw
    card 1
}

ctl.!default {
    type hw
    card 1
}
