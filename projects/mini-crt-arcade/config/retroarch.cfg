# RetroArch config — Mini CRT Arcade Box
# Location on Pi: /opt/retropie/configs/all/retroarch.cfg

# Video
video_fullscreen = "true"
video_smooth = "false"

# Aspect ratio: force 4:3 to preserve correct NES proportions on 3:2 display
video_aspect_ratio_auto = "false"
video_aspect_ratio = "1.333333"
video_scale_integer = "false"

# Audio
# For USB DAC (temporary): uncomment the hw:1,0 line
# For HDMI display audio: comment out audio_device (uses ALSA default)
# audio_device = "hw:1,0"

audio_enable = "true"
audio_latency = "64"

# Input
input_player1_joypad_index = "0"

# On-screen notifications
fps_show = "false"
